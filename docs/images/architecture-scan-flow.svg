<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Trigger -->
  <rect x="220" y="20" width="240" height="52" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">/scan github.com/user/repo</text>
  <text x="340" y="60" text-anchor="middle" font-size="11" fill="#5F5E5A">Telegram · Web-UI</text>

  <line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Scout → Docs -->
  <rect x="180" y="108" width="320" height="60" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Scout → Graph → Documents generated</text>
  <text x="340" y="150" text-anchor="middle" font-size="11" fill="#534AB7">DPA · ToM · SCC · AI Act Manifest — assembled locally</text>

  <line x1="340" y1="168" x2="340" y2="204" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="190" font-size="11" fill="#5F5E5A">Delivery</text>

  <!-- Left: Telegram -->
  <rect x="30" y="210" width="240" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Telegram file attachment</text>
  <text x="150" y="252" text-anchor="middle" font-size="11" fill="#0F6E56">immediate · downloadable</text>
  <text x="150" y="268" text-anchor="middle" font-size="11" fill="#0F6E56">Markdown or PDF</text>

  <!-- Right: Repo commit -->
  <rect x="410" y="210" width="240" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="530" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Auto-commit to repo</text>
  <text x="530" y="252" text-anchor="middle" font-size="11" fill="#0F6E56">legal/scan/ in repo</text>
  <text x="530" y="268" text-anchor="middle" font-size="11" fill="#0F6E56">Git as version history</text>

  <path d="M300 210 L150 282" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M380 210 L530 282" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Supabase -->
  <rect x="190" y="340" width="300" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Supabase: generated_docs</text>
  <text x="340" y="380" text-anchor="middle" font-size="11" fill="#854F0B">run_id · doc_type · status · version</text>

  <line x1="150" y1="282" x2="270" y2="338" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="530" y1="282" x2="410" y2="338" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <line x1="340" y1="396" x2="340" y2="432" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Web-UI -->
  <rect x="190" y="436" width="300" height="60" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="460" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Web-UI localhost:18789</text>
  <text x="340" y="478" text-anchor="middle" font-size="11" fill="#185FA5">Current docs · delta view · history</text>

  <!-- DPA note -->
  <rect x="20" y="448" width="150" height="48" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="95" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#791F1F">DPA obligation</text>
  <text x="95" y="484" text-anchor="middle" font-size="10" fill="#A32D2D">direct link per service</text>

  <rect x="510" y="448" width="150" height="48" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="585" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#791F1F">55 services</text>
  <text x="585" y="484" text-anchor="middle" font-size="10" fill="#A32D2D">dpa_url in Neo4j</text>
</svg>
