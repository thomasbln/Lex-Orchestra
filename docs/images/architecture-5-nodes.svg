<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">5-Node LangGraph Pipeline</text>

  <!-- Node 1 -->
  <rect x="40" y="40" width="600" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="40" y="40" width="130" height="60" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="105" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">1  Scout</text>
  <text x="105" y="84" text-anchor="middle" font-size="10" fill="#534AB7">node_scout</text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#3C3489">GitHub API → docker-compose, package.json, .env.example</text>
  <text x="400" y="80" text-anchor="middle" font-size="11" fill="#534AB7">COMPLIANCE_PACKAGES whitelist · stable project_id via uuid5(repo_url)</text>

  <line x1="340" y1="100" x2="340" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2 -->
  <rect x="40" y="120" width="600" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="40" y="120" width="130" height="60" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="105" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">2  Graph</text>
  <text x="105" y="164" text-anchor="middle" font-size="10" fill="#534AB7">node_graph</text>
  <text x="400" y="142" text-anchor="middle" font-size="12" fill="#3C3489">Neo4j MATCH → DPA obligations, SCCs, dpa_url, EU AI Act risk</text>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#534AB7">Deterministic — no LLM guessing</text>

  <line x1="340" y1="180" x2="340" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3 -->
  <rect x="40" y="200" width="600" height="60" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="40" y="200" width="130" height="60" rx="10" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="105" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">3  Reasoning</text>
  <text x="105" y="244" text-anchor="middle" font-size="10" fill="#5F5E5A">node_reasoning</text>
  <text x="400" y="222" text-anchor="middle" font-size="12" fill="#2C2C2A">Claude evaluates compliance — anonymised context only (ADR-001)</text>
  <text x="400" y="240" text-anchor="middle" font-size="11" fill="#5F5E5A">No customer data · No filenames · Generic service categories only</text>

  <line x1="340" y1="260" x2="340" y2="280" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4 -->
  <rect x="40" y="280" width="600" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="40" y="280" width="130" height="60" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">4  Documents</text>
  <text x="105" y="324" text-anchor="middle" font-size="10" fill="#0F6E56">node_documents</text>
  <text x="400" y="302" text-anchor="middle" font-size="12" fill="#085041">Generate DPA, ToM, SCC, AI Act Manifest</text>
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="#0F6E56">dpa_url per service in DPA · versioning in Supabase generated_docs</text>

  <line x1="340" y1="340" x2="340" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 5 -->
  <rect x="40" y="360" width="600" height="48" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="40" y="360" width="130" height="48" rx="10" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">5  Notify</text>
  <text x="105" y="396" text-anchor="middle" font-size="10" fill="#04342C">index.ts plugin</text>
  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#085041">Docs as Telegram attachments · DPA obligation section with direct links</text>
  <text x="400" y="396" text-anchor="middle" font-size="11" fill="#0F6E56">⚠️ Non-EU services · ✅ EU services · direct link to DPA</text>
</svg>
