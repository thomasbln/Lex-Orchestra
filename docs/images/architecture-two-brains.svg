<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Neo4j Brain - Left -->
  <rect x="20" y="20" width="340" height="480" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="190" y="58" text-anchor="middle" font-size="15" font-weight="600" fill="#3C3489">Neo4j — Legal Brain</text>
  <text x="190" y="78" text-anchor="middle" font-size="12" fill="#534AB7">Public regulatory knowledge</text>

  <rect x="44" y="96" width="292" height="48" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="116" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">Service(name: "Stripe")</text>
  <text x="190" y="134" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">→ REQUIRES → DPA, SCC</text>

  <rect x="44" y="156" width="292" height="48" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="176" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">Law(GDPR Art. 28)</text>
  <text x="190" y="194" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">Control(ISO A.9.1.1)</text>

  <rect x="44" y="216" width="292" height="48" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="190" y="236" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">RiskLevel(GPAI)</text>
  <text x="190" y="254" text-anchor="middle" font-size="12" font-style="italic" fill="#3C3489">Country(USA) → SCCs required</text>

  <line x1="44" y1="282" x2="336" y2="282" stroke="#AFA9EC" stroke-width="0.5"/>

  <text x="190" y="302" text-anchor="middle" font-size="11" fill="#5F5E5A">What never changes:</text>
  <text x="190" y="320" text-anchor="middle" font-size="11" fill="#5F5E5A">No customer context, no UUIDs</text>
  <text x="190" y="338" text-anchor="middle" font-size="11" fill="#5F5E5A">No scan results, no tokens</text>
  <text x="190" y="356" text-anchor="middle" font-size="11" fill="#5F5E5A">→ Shared knowledge, immutable</text>

  <text x="190" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">510 Nodes · 936 Relationships</text>
  <text x="190" y="430" text-anchor="middle" font-size="11" fill="#534AB7">+ dpa_url for 55 services</text>
  <text x="190" y="472" text-anchor="middle" font-size="11" fill="#888780">Read-mostly · No user context</text>

  <!-- Arrow between -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="362" y1="260" x2="436" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="399" y="250" text-anchor="middle" font-size="11" fill="#5F5E5A">Node 2</text>
  <text x="399" y="276" text-anchor="middle" font-size="11" fill="#5F5E5A">enrichment</text>

  <!-- Supabase Brain - Right -->
  <rect x="440" y="20" width="340" height="480" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="610" y="58" text-anchor="middle" font-size="15" font-weight="600" fill="#085041">Supabase — Project Brain</text>
  <text x="610" y="78" text-anchor="middle" font-size="12" fill="#0F6E56">All project-specific state</text>

  <rect x="464" y="96" width="292" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">assets</text>
  <text x="610" y="136" text-anchor="middle" font-size="11" fill="#0F6E56">UUID ↔ real asset name</text>
  <text x="610" y="150" text-anchor="middle" font-size="11" fill="#0F6E56">PII separation ADR-001</text>

  <rect x="464" y="164" width="292" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">scan_results</text>
  <text x="610" y="204" text-anchor="middle" font-size="11" fill="#0F6E56">run_id · project · services</text>
  <text x="610" y="218" text-anchor="middle" font-size="11" fill="#0F6E56">risk_level · timestamp</text>

  <rect x="464" y="232" width="292" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">generated_docs</text>
  <text x="610" y="272" text-anchor="middle" font-size="11" fill="#0F6E56">Versioned: DPA, ToM, SCC</text>
  <text x="610" y="286" text-anchor="middle" font-size="11" fill="#0F6E56">run_id · path · status</text>

  <rect x="464" y="300" width="292" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">github_tokens</text>
  <text x="610" y="340" text-anchor="middle" font-size="11" fill="#0F6E56">owner → token_enc</text>
  <text x="610" y="354" text-anchor="middle" font-size="11" fill="#0F6E56">AES-256 encrypted, ADR-008</text>

  <rect x="464" y="368" width="292" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">project_config</text>
  <text x="610" y="408" text-anchor="middle" font-size="11" fill="#0F6E56">website_url · company_name</text>
  <text x="610" y="422" text-anchor="middle" font-size="11" fill="#0F6E56">language · output_format</text>

  <rect x="464" y="436" width="292" height="48" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="610" y="458" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">langgraph_checkpoints</text>
  <text x="610" y="476" text-anchor="middle" font-size="11" fill="#0F6E56">LangGraph state · run history</text>
</svg>
