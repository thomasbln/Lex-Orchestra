<svg width="800" height="680" viewBox="0 0 800 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <rect width="800" height="680" fill="#FAFAF9"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── LAYER 1 — Seed Layer Architecture ── -->
  <rect x="30" y="20" width="740" height="108" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <rect x="30" y="20" width="6" height="108" rx="3" fill="#888780"/>
  <text x="56" y="46" font-size="13" font-weight="700" fill="#2C2C2A">Layer 1 — Seed Layer Architecture (ADR-009)</text>
  <text x="56" y="64" font-size="11" fill="#5F5E5A">Global frameworks · EU primary law · DE national law · opt-in frameworks — each deployed independently</text>

  <!-- seed layer pills -->
  <rect x="56" y="74" width="96" height="24" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="104" y="90" text-anchor="middle" font-size="10" fill="#2C2C2A">00_global</text>

  <rect x="162" y="74" width="110" height="24" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="217" y="90" text-anchor="middle" font-size="10" fill="#2C2C2A">10_eu_primary</text>

  <rect x="282" y="74" width="76" height="24" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="320" y="90" text-anchor="middle" font-size="10" fill="#2C2C2A">10_de</text>

  <rect x="368" y="74" width="76" height="24" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="406" y="90" text-anchor="middle" font-size="10" fill="#2C2C2A">10_us …</text>

  <rect x="454" y="74" width="96" height="24" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="502" y="90" text-anchor="middle" font-size="10" fill="#2C2C2A">20_frameworks</text>

  <text x="560" y="90" font-size="10" fill="#888780">seed_config.yaml controls what loads</text>

  <!-- connector -->
  <line x1="400" y1="128" x2="400" y2="154" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="144" font-size="10" fill="#888780">+ temporal properties</text>

  <!-- ── LAYER 2 — Temporal + Confidence ── -->
  <rect x="30" y="158" width="740" height="110" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <rect x="30" y="158" width="6" height="110" rx="3" fill="#1D9E75"/>
  <text x="56" y="184" font-size="13" font-weight="700" fill="#04342C">Layer 2 — Temporal Graph + Confidence (✅ complete)</text>
  <text x="56" y="202" font-size="11" fill="#085041">All 35 Law nodes: applies_from · valid_from · confidence · jurisdictions · source — verified from official PDFs</text>

  <!-- two code blocks side by side -->
  <rect x="56" y="212" width="310" height="44" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="68" y="228" font-size="10" font-family="monospace" fill="#04342C">Law { applies_from: 2026-09-11</text>
  <text x="68" y="243" font-size="10" font-family="monospace" fill="#04342C">      confidence: 1.0, jurisdictions: ["EU"] }</text>

  <rect x="378" y="212" width="370" height="44" rx="6" fill="#04342C" stroke="#085041" stroke-width="0.5"/>
  <text x="392" y="228" font-size="10" fill="#9FE1CB">confidence: 1.0 = from official source (PDF/EUR-Lex)</text>
  <text x="392" y="243" font-size="10" fill="#5DCAA5">confidence: 0.9 = unverified · note_unverified set</text>

  <!-- connector -->
  <line x1="400" y1="268" x2="400" y2="294" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="416" y="284" font-size="10" fill="#0F6E56">+ scanner + UseCase nodes</text>

  <!-- ── LAYER 3 — Context Graph ── -->
  <rect x="30" y="298" width="740" height="130" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <rect x="30" y="298" width="6" height="130" rx="3" fill="#534AB7"/>
  <text x="56" y="324" font-size="13" font-weight="700" fill="#26215C">Layer 3 — Context Graph: Scanner + UseCase Nodes (ADR-010)</text>
  <text x="56" y="342" font-size="11" fill="#3C3489">Scanner personalises the graph per project · UseCase nodes add deployer-perspective risk classification</text>

  <!-- left: scanner -->
  <rect x="56" y="352" width="290" height="64" rx="8" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="72" y="370" font-size="10" font-weight="600" fill="#26215C">Scanner → ProjectAsset (ADR-001)</text>
  <text x="72" y="386" font-size="10" fill="#3C3489">Project:uuid → USES → Stripe → AVV</text>
  <text x="72" y="401" font-size="10" fill="#534AB7">rescan = delta → compliance_task</text>

  <!-- right: UseCase -->
  <rect x="358" y="352" width="390" height="64" rx="8" fill="#534AB7" stroke="#3C3489" stroke-width="0.5"/>
  <text x="374" y="370" font-size="10" font-weight="600" fill="#EEEDFE">UseCase Nodes — Deployer Risk (ADR-010)</text>
  <text x="374" y="386" font-size="10" fill="#CECBF6">customer_service_chatbot → Limited (Art. 50)</text>
  <text x="374" y="401" font-size="10" fill="#AFA9EC">hr_recruitment_screening → High (Anhang III Nr. 4)</text>

  <!-- connector -->
  <line x1="400" y1="428" x2="400" y2="454" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="416" y="444" font-size="10" fill="#534AB7">+ NewsEvent + confidence decay</text>

  <!-- ── LAYER 4 — Self-Describing ── -->
  <rect x="30" y="458" width="740" height="130" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="1"/>
  <rect x="30" y="458" width="6" height="130" rx="3" fill="#BA7517"/>
  <text x="56" y="484" font-size="13" font-weight="700" fill="#412402">Layer 4 — Self-Describing Context Graph (ADR-011)</text>
  <text x="56" y="502" font-size="11" fill="#633806">Graph knows what it does not know · NewsEvents signal regulatory changes · confidence decay marks staleness</text>

  <!-- three badges -->
  <rect x="56" y="512" width="190" height="44" rx="6" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
  <text x="68" y="528" font-size="10" font-family="monospace" fill="#412402">KnowledgeSource {</text>
  <text x="68" y="542" font-size="10" font-family="monospace" fill="#412402">  status: "missing" }</text>

  <rect x="256" y="512" width="220" height="44" rx="6" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/>
  <text x="268" y="528" font-size="10" font-family="monospace" fill="#412402">NewsEvent -[:AMENDS]→ Law</text>
  <text x="268" y="542" font-size="10" font-family="monospace" fill="#412402">  → confidence decay 1.0 → 0.7</text>

  <rect x="486" y="512" width="262" height="44" rx="6" fill="#412402" stroke="#633806" stroke-width="0.5"/>
  <text x="500" y="528" font-size="10" fill="#FAC775">Dashboard: "EU AI Act changed —</text>
  <text x="500" y="542" font-size="10" fill="#EF9F27">  your docs may be outdated"</text>

  <!-- bottom arrow + learning loop -->
  <line x1="400" y1="588" x2="400" y2="610" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="160" y="612" width="480" height="52" rx="8" fill="#2C2C2A" stroke="#444441" stroke-width="0.5"/>
  <text x="400" y="634" text-anchor="middle" font-size="11" font-weight="600" fill="#FAC775">Self-Learning Orchestrator</text>
  <text x="400" y="652" text-anchor="middle" font-size="10" fill="#B4B2A9">rescan delta → /approve feedback → Preference Node → weighted findings</text>

</svg>
