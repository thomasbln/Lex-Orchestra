<svg width="100%" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#141920"/>
  </linearGradient>
</defs>

<rect width="800" height="520" fill="url(#bg)" rx="12"/>
<g stroke="rgba(255,255,255,0.03)" stroke-width="1">
  <line x1="0" y1="80" x2="800" y2="80"/>
  <line x1="400" y1="80" x2="400" y2="480"/>
</g>

<!-- Title -->
<text x="400" y="32" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="3">TWO DATA STORES — CLEAR ROLES</text>
<text x="400" y="56" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">Neo4j knows what the law requires. Supabase knows what your project does.</text>

<!-- Left: Neo4j -->
<text x="200" y="102" text-anchor="middle" font-size="10" fill="#AFA9EC" letter-spacing="2">CLOUD</text>
<text x="200" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#CECBF6">Neo4j — Compliance Logic</text>
<text x="200" y="136" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.55)">Public regulatory knowledge · anonymised UUIDs only</text>

<rect x="20" y="150" width="360" height="44" rx="6" fill="rgba(83,74,183,0.12)" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="168" text-anchor="middle" font-size="11" font-weight="500" fill="#CECBF6">Laws &amp; regulations</text>
<text x="200" y="184" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.55)">GDPR Art. 28 · EU AI Act · CRA · NIS2 · ISO 27001</text>

<rect x="20" y="204" width="360" height="44" rx="6" fill="rgba(83,74,183,0.12)" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="222" text-anchor="middle" font-size="11" font-weight="500" fill="#CECBF6">Service mappings</text>
<text x="200" y="238" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.55)">Stripe → DPA required · 55 services with DPA signing links</text>

<rect x="20" y="258" width="360" height="44" rx="6" fill="rgba(83,74,183,0.12)" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="276" text-anchor="middle" font-size="11" font-weight="500" fill="#CECBF6">UseCase risk classification</text>
<text x="200" y="292" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.55)">customer_service_chatbot → Limited (Art. 50)</text>

<rect x="20" y="312" width="360" height="44" rx="6" fill="rgba(83,74,183,0.12)" stroke="#534AB7" stroke-width="0.5"/>
<text x="200" y="330" text-anchor="middle" font-size="11" font-weight="500" fill="#CECBF6">Controls &amp; frameworks</text>
<text x="200" y="346" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.55)">ISO 27001 · BSI · OWASP · NIST CSF 2.0</text>

<text x="200" y="390" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.4)">510 nodes · 936 relationships</text>
<text x="200" y="408" text-anchor="middle" font-size="10" fill="rgba(175,169,236,0.3)">Read-mostly · no customer data ever stored</text>

<!-- Center arrow -->
<line x1="383" y1="260" x2="417" y2="260" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="400" y="248" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.2)">enrichment</text>

<!-- Right: Supabase -->
<text x="600" y="102" text-anchor="middle" font-size="10" fill="#5DCAA5" letter-spacing="2">LOCAL</text>
<text x="600" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB">Supabase — Project State</text>
<text x="600" y="136" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.55)">All project-specific data · never leaves your network</text>

<rect x="420" y="150" width="360" height="44" rx="6" fill="rgba(15,110,86,0.15)" stroke="#1D9E75" stroke-width="0.5"/>
<text x="600" y="168" text-anchor="middle" font-size="11" font-weight="500" fill="#9FE1CB">UUID ↔ asset mapping</text>
<text x="600" y="184" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.55)">Real names stay here · cloud sees only UUIDs</text>

<rect x="420" y="204" width="360" height="44" rx="6" fill="rgba(15,110,86,0.15)" stroke="#1D9E75" stroke-width="0.5"/>
<text x="600" y="222" text-anchor="middle" font-size="11" font-weight="500" fill="#9FE1CB">Scan results &amp; project state</text>
<text x="600" y="238" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.55)">Services detected · risk level · run history</text>

<rect x="420" y="258" width="360" height="44" rx="6" fill="rgba(15,110,86,0.15)" stroke="#1D9E75" stroke-width="0.5"/>
<text x="600" y="276" text-anchor="middle" font-size="11" font-weight="500" fill="#9FE1CB">Generated documents</text>
<text x="600" y="292" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.55)">DPA · ToM · SCC · AI Act Manifest — versioned</text>

<rect x="420" y="312" width="360" height="44" rx="6" fill="rgba(15,110,86,0.15)" stroke="#1D9E75" stroke-width="0.5"/>
<text x="600" y="330" text-anchor="middle" font-size="11" font-weight="500" fill="#9FE1CB">Workflow state</text>
<text x="600" y="346" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.55)">LangGraph checkpoints · project config</text>

<text x="600" y="390" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.4)">Self-hosted Docker · PostgreSQL 15</text>
<text x="600" y="408" text-anchor="middle" font-size="10" fill="rgba(93,202,165,0.3)">No customer data leaves this store</text>

<!-- Bottom bar -->
<rect x="20" y="430" width="760" height="1" fill="rgba(255,255,255,0.06)"/>
<text x="400" y="458" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.3)">Data sovereignty enforced by architecture — not by policy</text>

<!-- Corner accents -->
<path d="M20 48 L20 20 L48 20" stroke="rgba(83,74,183,0.3)" stroke-width="1" fill="none"/>
<path d="M780 48 L780 20 L752 20" stroke="rgba(29,158,117,0.3)" stroke-width="1" fill="none"/>
<path d="M20 472 L20 500 L48 500" stroke="rgba(239,159,39,0.25)" stroke-width="1" fill="none"/>
<path d="M780 472 L780 500 L752 500" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>
</svg>
